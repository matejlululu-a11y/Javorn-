<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moje Směny</title>
<style>
    body { font-family: sans-serif; padding: 10px; background: #eee; }
    .box { background: white; padding: 15px; border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    .admin-controls { display: none; margin-bottom: 10px; padding: 10px; background: #fff9c4; border-radius: 5px; }
    button { padding: 8px; cursor: pointer; }
    .del { color: red; border: 1px solid red; background: none; margin-left: 5px; }
</style>
</head>
<body>

<div class="box">
    <h2>📅 Evidence směn</h2>

    <div id="adminControls" class="admin-controls">
        <input id="nameInput" placeholder="Jméno">
        <button onclick="addPerson()">➕ Přidat</button>
        <hr>
        <input id="dateInput" placeholder="Datum">
        <button onclick="addShift()">📅 Nový den</button>
    </div>

    <table id="table"></table>

    <div style="margin-top:20px; border-top: 1px solid #ccc; padding-top: 10px;">
        <input type="password" id="code" placeholder="Kód 1564">
        <button onclick="unlock()">Odemknout</button>
    </div>
</div>

<script>
let people = JSON.parse(localStorage.getItem('smeny_people')) || [];
let shifts = JSON.parse(localStorage.getItem('smeny_shifts')) || [];
let isAdmin = false;

function unlock() {
    if(document.getElementById('code').value === '1564') {
        isAdmin = true;
        document.getElementById('adminControls').style.display = 'block';
        render();
    } else { alert('Špatný kód'); }
}

function save() {
    localStorage.setItem('smeny_people', JSON.stringify(people));
    localStorage.setItem('smeny_shifts', JSON.stringify(shifts));
    render();
}

function addPerson() {
    let n = document.getElementById('nameInput').value;
    if(n) { people.push({name: n, data: {}}); document.getElementById('nameInput').value=''; save(); }
}

function addShift() {
    let d = document.getElementById('dateInput').value;
    if(d) { shifts.push(d); document.getElementById('dateInput').value=''; save(); }
}

function setStatus(pi, s, v) {
    if(!isAdmin) return;
    people[pi].data[s] = v;
    save();
}

function delPerson(i) { if(confirm('Smazat?')) { people.splice(i,1); save(); } }
function delShift(i) { if(confirm('Smazat?')) { shifts.splice(i,1); save(); } }

function render() {
    let t = document.getElementById('table');
    let h = `<tr><th>Jméno</th>`;
    shifts.forEach((s, i) => h += `<th>${s}${isAdmin ? `<button class="del" onclick="delShift(${i})">x</button>` : ''}</th>`);
    h += `<th>Σ</th></tr>`;
    
    let rows = people.map((p, pi) => {
        let r = `<tr><td><strong>${p.name}</strong>${isAdmin ? `<button class="del" onclick="delPerson(${pi})">x</button>` : ''}</td>`;
        let total = 0;
        shifts.forEach(s => {
            let val = p.data[s] || '';
            if(val === 'B') total += 1;
            if(val === 'P') total += 0.5;
            
            if(isAdmin) {
                r += `<td>
                    <button onclick="setStatus(${pi},'${s}','B')">✔</button>
                    <button onclick="setStatus(${pi},'${s}','P')">½</button>
                    <button onclick="setStatus(${pi},'${s}','N')">✖</button>
                </td>`;
            } else {
                r += `<td>${val === 'B' ? '✅' : (val === 'P' ? '🌗' : (val === 'N' ? '❌' : '-'))}</td>`;
            }
        });
        return r + `<td>${total}</td></tr>`;
    }).join('');
    t.innerHTML = h + rows;
}
render();
</script>
</body>
</html>
